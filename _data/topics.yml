  - slug: clinical-biostatistics
    display: "Clinical Biostatistics"
    color: "#bcbd22"
    blurb: "Methods for clinical research and regulatory submissions."
    order: 14

  - slug: meta-analysis
    display: "Meta-Analysis"
    color: "#17becf"
