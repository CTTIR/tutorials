project:
  type: website
  output-dir: docs
  pre-render:
    # build_graph.py validates tutorial front matter against
    # _data/topics.yml and emits artifacts/graph.json plus the
    # tutorials.csv / cooccurrence.csv download artifacts. Failure
    # aborts render with a file-specific error.
    - python scripts/build_graph.py
    # build_related.py reads artifacts/graph.json and writes one
    # _includes/related/<topic>__<slug>.html per tutorial. The Lua
    # filter `_filters/related-include.lua` injects each partial into
    # its tutorial at render time — replaces client-side js/related.js.
    - python scripts/build_related.py
  post-render:
    # Pagefind index for site search and the overview filter. Runs after
    # docs/ is rendered. Requires Node + npx on PATH (CI installs them);
    # the script soft-skips with a warning when Node is unavailable so
    # `quarto preview` still works locally without Node.
    - python scripts/build_pagefind.py
  resources:
    - "js/**"
    - "css/**"
    - "images/**"
    - "assets/js/**"
    - "artifacts/**"
    - "CNAME"

execute:
  freeze: auto

