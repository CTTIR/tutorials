format:
  html:
    theme:
      dark:  [darkly, assets/dark.scss]
      light: [flatly, assets/light.scss]
    toc: true
    toc-depth: 3
    toc-location: right
    code-copy: true
    code-overflow: wrap
    link-external-newwindow: true
    include-in-header:
      - text: |
          <link rel="preconnect" href="https://fonts.googleapis.com">
          <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
          <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
          <script>
          // Clear stale localStorage from before dark-mode-by-default so returning
          // visitors get the new default. Runs once per browser, gated by a versioned
          // flag — users who explicitly toggle after this point are respected.
          (function(){
            try {
              if (!localStorage.getItem("quarto-color-scheme-reset-v1")) {
                localStorage.removeItem("quarto-color-scheme");
                localStorage.setItem("quarto-color-scheme-reset-v1", "1");
              }
            } catch (e) {}
          })();
          </script>
          <script defer data-domain="cttir.github.io/tutorials" src="https://analytics.hellebo.de/js/script.file-downloads.outbound-links.js"></script>
          <script>window.plausible = window.plausible || function() { (window.plausible.q = window.plausible.q || []).push(arguments) }</script>
    filters:
      # Injects the static "Related tutorials" partial emitted by
      # scripts/build_related.py into every tutorial detail page.
      # No-op for non-tutorial pages.
      - _filters/related-include.lua
    include-after-body:
      - text: |
          <script>
          // Global navbar search. Submits to overview.html?q=<term>.
          // Uses the navbar-brand href to resolve the site root, so it
          // works under root and subpath hosting. No-op if the navbar
          // isn't present (e.g. raw print pages).
          (function(){
            function inject(){
              var brand = document.querySelector(".navbar-brand[href]");
              if (!brand) return;
              var nav = document.querySelector(".navbar .navbar-nav.ms-auto, .navbar .navbar-nav:last-of-type");
              if (!nav) return;
              if (document.getElementById("global-search-form")) return;
              var rootHref = brand.getAttribute("href") || "";
              if (rootHref && !rootHref.endsWith("/")) rootHref = rootHref.replace(/[^/]*$/, "");
              var form = document.createElement("form");
              form.id = "global-search-form";
              form.role = "search";
              form.className = "global-search d-flex";
              form.addEventListener("submit", function(ev){
                ev.preventDefault();
                var q = form.querySelector("input").value.trim();
                var url = rootHref + "overview.html" + (q ? "?q=" + encodeURIComponent(q) : "");
                window.location.href = url;
              });
              var input = document.createElement("input");
              input.type = "search";
              input.name = "q";
              input.placeholder = "Search…";
              input.setAttribute("aria-label", "Search tutorials");
              input.autocomplete = "off";
              form.appendChild(input);
              nav.parentNode.insertBefore(form, nav);
            }
            if (document.readyState === "loading") {
              document.addEventListener("DOMContentLoaded", inject);
            } else {
              inject();
            }
          })();
          </script>
          <style>
          .global-search { margin: 0 0.5rem; align-items: center; }
          .global-search input {
            padding: 0.3rem 0.6rem;
            border: 1px solid var(--rule, #ccc);
            border-radius: 0.3rem;
            background: var(--surface, #fff);
            color: var(--fg, #222);
            font-size: 0.85rem;
            width: 12rem;
          }
          .global-search input:focus {
            outline: 2px solid var(--accent, #1a73e8);
            outline-offset: 1px;
            border-color: var(--accent, #1a73e8);
          }
          @media (max-width: 768px) {
            .global-search input { width: 9rem; }
          }
          </style>

